<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Spend</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          
          if (descriptor && !descriptor.configurable) {
            console.warn('window.fetch is not configurable. Attempting to override it anyway might fail.');
          }

          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return originalFetch;
            },
            set: function(value) {
              console.log('Intercepted attempt to set window.fetch');
              originalFetch = value;
            }
          });
        } catch (e) {
          console.error('Failed to redefine window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
